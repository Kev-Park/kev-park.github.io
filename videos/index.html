<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Rollout Videos</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 1rem;
    font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0d1117; color: #e6edf3;
  }
  h1 { font-size: 1.4rem; margin: .25rem 0 1rem; }
  .meta { color: #8b949e; font-size: .85rem; margin-bottom: 1.25rem; }
  .card {
    background: #161b22; border: 1px solid #30363d; border-radius: 10px;
    padding: .75rem; margin: 0 0 1rem;
  }
  .card h2 { font-size: 1rem; margin: 0 0 .5rem; word-break: break-word; }
  .card .sub { color: #8b949e; font-size: .8rem; font-weight: 400; }
  video { width: 100%; border-radius: 6px; background: #000; display: block; }
  .row { display: flex; gap: 1rem; margin-top: .5rem; font-size: .85rem; }
  a { color: #58a6ff; text-decoration: none; }
  a:active { text-decoration: underline; }
  .empty, .error { color: #8b949e; padding: 2rem 0; }
  .error { color: #f85149; }
</style>
</head>
<body>
  <h1>Rollout Videos</h1>
  <div class="meta" id="meta">Loading…</div>
  <div id="list"></div>

<script>
const REPO = "Kev-Park/kev-park.github.io";
const DIR  = "videos";

// "2026-06-28_0012_my_label.mp4" -> { label, when }
function parse(name) {
  const base = name.replace(/\.mp4$/i, "");
  const m = base.match(/^(\d{4}-\d{2}-\d{2})_(\d{2})(\d{2})_(.*)$/);
  if (!m) return { label: base.replace(/_/g, " "), when: "" };
  return { label: m[4].replace(/_/g, " "), when: `${m[1]} ${m[2]}:${m[3]}` };
}

async function load() {
  const meta = document.getElementById("meta");
  const list = document.getElementById("list");
  try {
    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${DIR}`, {
      headers: { "Accept": "application/vnd.github+json" }
    });
    if (!res.ok) throw new Error(`GitHub API ${res.status}`);
    const files = (await res.json())
      .filter(f => f.type === "file" && /\.mp4$/i.test(f.name))
      .sort((a, b) => b.name.localeCompare(a.name)); // timestamp-prefixed -> newest first

    if (!files.length) {
      meta.textContent = "No videos right now.";
      return;
    }
    meta.textContent = `${files.length} video${files.length > 1 ? "s" : ""} · newest first`;

    for (const f of files) {
      const { label, when } = parse(f.name);
      const card = document.createElement("div");
      card.className = "card";

      const h = document.createElement("h2");
      h.textContent = label;
      if (when) { const s = document.createElement("span"); s.className = "sub"; s.textContent = "  ·  " + when; h.appendChild(s); }

      const v = document.createElement("video");
      v.controls = true; v.preload = "metadata"; v.playsInline = true;
      v.src = "./" + encodeURIComponent(f.name);

      const row = document.createElement("div");
      row.className = "row";
      const dl = document.createElement("a");
      dl.href = "./" + encodeURIComponent(f.name); dl.download = f.name; dl.textContent = "Download";
      row.appendChild(dl);

      card.append(h, v, row);
      list.appendChild(card);
    }
  } catch (e) {
    meta.className = "error";
    meta.textContent = "Couldn't load video list: " + e.message +
      " (GitHub API allows 60 requests/hour per IP — try again shortly.)";
  }
}
load();
</script>
</body>
</html>
