<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Videos</title>
</head>
<body>
<h1>Videos</h1>
<ul id="list"><li>Loading…</li></ul>
<script>
const REPO = "Kev-Park/kev-park.github.io", DIR = "videos";
fetch(`https://api.github.com/repos/${REPO}/contents/${DIR}`)
  .then(r => r.ok ? r.json() : Promise.reject(new Error("GitHub API " + r.status)))
  .then(files => {
    const mp4s = files.filter(f => f.type === "file" && /\.mp4$/i.test(f.name))
                      .sort((a, b) => b.name.localeCompare(a.name)); // newest first
    const list = document.getElementById("list");
    list.innerHTML = "";
    if (!mp4s.length) { list.innerHTML = "<li>No videos.</li>"; return; }
    for (const f of mp4s) {
      const li = document.createElement("li");
      const a = document.createElement("a");
      a.href = "./" + encodeURIComponent(f.name);
      a.textContent = f.name;
      li.appendChild(a);
      list.appendChild(li);
    }
  })
  .catch(e => { document.getElementById("list").innerHTML = "<li>Couldn't load list: " + e.message + "</li>"; });
</script>
</body>
</html>
